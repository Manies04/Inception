version: '3.8'

services:
  mariadb:
    build: requirements/mariadb
    env_file: .env
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception
    restart: always

volumes:
  db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb

networks:
  inception:
    driver: bridge